<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שליחת ווצאפ בתפוצה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0f12;
      --surface:     #141a1f;
      --surface2:    #1c2530;
      --border:      #243040;
      --green:       #25d366;
      --green-dark:  #1ebe5a;
      --green-glow:  rgba(37,211,102,0.18);
      --text:        #e8edf2;
      --text-muted:  #7a8fa6;
      --danger:      #e55353;
      --radius:      14px;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .logo {
      width: 52px; height: 52px;
      background: var(--green);
      border-radius: 50%;
      display: grid; place-items: center;
      box-shadow: 0 0 24px var(--green-glow);
    }
    .logo svg { width: 30px; height: 30px; fill: #fff; }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.4px; }
    header p  { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Field ── */
    .field { display: flex; flex-direction: column; gap: 8px; }
    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.97rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    select:focus, textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    select { cursor: pointer; appearance: none; -webkit-appearance: none; }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      left: 14px;
      top: 50%; transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.6;
    }
    textarea::placeholder { color: var(--text-muted); }

    .char-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: left;
    }

    /* ── Loading state ── */
    .loading-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.88rem; color: var(--text-muted);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(229,83,83,0.12);
      border: 1px solid rgba(229,83,83,0.35);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: var(--danger);
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── Send button ── */
    .btn-send {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
      width: 100%;
    }
    .btn-send:hover:not(:disabled) {
      background: var(--green-dark);
      box-shadow: 0 4px 20px var(--green-glow);
    }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-send svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

    /* ── Modal overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      display: none; place-items: center;
      z-index: 100;
    }
    .overlay.open { display: grid; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 92%; max-width: 420px;
      display: flex; flex-direction: column; gap: 20px;
      animation: pop 0.18s ease;
    }
    @keyframes pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal h2 { font-size: 1.15rem; font-weight: 700; }
    .modal-detail {
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
    }
    .modal-detail strong { color: var(--text); font-weight: 600; }
    .modal-detail .preview-msg {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 0.88rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      border: 1px solid var(--border);
      max-height: 120px;
      overflow-y: auto;
    }
    .modal-actions { display: flex; gap: 12px; }
    .btn-cancel {
      flex: 1; padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Heebo', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-confirm {
      flex: 2; padding: 12px;
      background: var(--green);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s;
    }
    .btn-confirm:hover:not(:disabled) { background: var(--green-dark); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 11px 22px;
      font-size: 0.9rem; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0; z-index: 200;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }

    /* ── Footer ── */
    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- WhatsApp icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
    </svg>
  </div>
  <div>
    <h1>שליחת ווצאפ בתפוצה</h1>
    <p>מופעל על-ידי רב-מסר</p>
  </div>
</header>

<div class="card">

  <div class="field">
    <label>רשימת תפוצה</label>
    <div id="listsLoading" class="loading-row">
      <div class="spinner"></div>
      <span>טוען רשימות...</span>
    </div>
    <div class="select-wrap" id="selectWrap" style="display:none;">
      <select id="listSelect">
        <option value="" disabled selected>— בחרי רשימה —</option>
      </select>
    </div>
    <div id="listsError" class="error-banner">לא ניתן לטעון רשימות. נסי לרענן.</div>
  </div>

  <div class="field">
    <label>הודעה</label>
    <textarea
      id="message"
      placeholder="הקלידי את תוכן ההודעה כאן..."
      maxlength="4096"
    ></textarea>
    <span class="char-count"><span id="charCount">0</span> / 4096 תווים</span>
  </div>

  <div id="sendError" class="error-banner"></div>

  <button class="btn-send" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    שלח הודעה
  </button>

</div>

<footer>כל ההודעות נשלחות דרך רב-מסר</footer>

<!-- Confirmation modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 id="modalTitle">אישור שליחה</h2>
    <div class="modal-detail">
      <div>רשימה: <strong id="confirmList">—</strong></div>
      <div class="preview-msg" id="confirmMsg"></div>
    </div>
    <p style="font-size:0.82rem;color:var(--text-muted)">ההודעה תישלח לכל אנשי הקשר ברשימה. פעולה זו בלתי הפיכה.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">ביטול</button>
      <button class="btn-confirm" id="confirmBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        כן, שלח
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script>
  const GET_LISTS_URL = 'https://hook.eu1.make.com/7kxf0rwpufs11u9w7vrev333d5pqgv57';
  const SEND_URL      = 'https://hook.eu1.make.com/8r0p1dqtlqul4i3rexil6o8s0uxkx8iu';

  const listSelect   = document.getElementById('listSelect');
  const messageEl    = document.getElementById('message');
  const sendBtn      = document.getElementById('sendBtn');
  const charCount    = document.getElementById('charCount');
  const overlay      = document.getElementById('overlay');
  const cancelBtn    = document.getElementById('cancelBtn');
  const confirmBtn   = document.getElementById('confirmBtn');
  const confirmList  = document.getElementById('confirmList');
  const confirmMsg   = document.getElementById('confirmMsg');
  const toast        = document.getElementById('toast');
  const listsLoading = document.getElementById('listsLoading');
  const selectWrap   = document.getElementById('selectWrap');
  const listsError   = document.getElementById('listsError');
  const sendError    = document.getElementById('sendError');

  // ── Load lists ──────────────────────────────────────────
  async function loadLists() {
    try {
      const res  = await fetch(GET_LISTS_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Support array of {id, name} OR array of strings
      const lists = Array.isArray(data) ? data : (data.lists || data.data || []);

      lists.forEach(item => {
        const opt = document.createElement('option');
        if (typeof item === 'string') {
          opt.value = item;
          opt.textContent = item;
        } else {
          opt.value = item.id ?? item.list_id ?? item.name;
          opt.textContent = item.name ?? item.title ?? item.label ?? opt.value;
        }
        listSelect.appendChild(opt);
      });

      listsLoading.style.display = 'none';
      selectWrap.style.display   = 'block';
    } catch (err) {
      listsLoading.style.display = 'none';
      listsError.classList.add('visible');
      console.error('Failed to load lists:', err);
    }
  }

  // ── Enable send button when both fields are filled ──────
  function checkReady() {
    sendBtn.disabled = !(listSelect.value && messageEl.value.trim());
  }

  listSelect.addEventListener('change', checkReady);
  messageEl.addEventListener('input', () => {
    charCount.textContent = messageEl.value.length;
    checkReady();
  });

  // ── Open confirmation modal ──────────────────────────────
  sendBtn.addEventListener('click', () => {
    sendError.classList.remove('visible');
    confirmList.textContent = listSelect.options[listSelect.selectedIndex]?.text ?? listSelect.value;
    confirmMsg.textContent  = messageEl.value.trim();
    overlay.classList.add('open');
    confirmBtn.focus();
  });

  cancelBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() { overlay.classList.remove('open'); }

  // ── Send ────────────────────────────────────────────────
  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<div class="spinner" style="border-top-color:#fff;width:16px;height:16px;"></div> שולח...';

    const payload = {
      list_id: listSelect.value,
      message: messageEl.value.trim()
    };

    try {
      const res = await fetch(SEND_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      closeModal();
      showToast('ההודעה נשלחה בהצלחה!', 'success');
      messageEl.value = '';
      charCount.textContent = '0';
      listSelect.value = '';
      sendBtn.disabled = true;
    } catch (err) {
      closeModal();
      sendError.textContent = 'שליחה נכשלה. אנא נסי שוב.';
      sendError.classList.add('visible');
      showToast('שגיאה בשליחה', 'error');
      console.error('Send error:', err);
    } finally {
      confirmBtn.disabled = false;
      confirmBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> כן, שלח';
    }
  });

  // ── Toast helper ────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className   = `toast ${type} show`;
    toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
  }

  // ── Init ────────────────────────────────────────────────
  loadLists();
</script>
</body>
</html>
